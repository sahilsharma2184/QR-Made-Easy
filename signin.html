<body>
  
    <h1>WELCOME BACK! PLEASE ENTER YOUR CREDENTIALS TO ACCESS YOUR ACCOUNT.</h1>
    <div class="white-box">

        <form action="submit" >
            <div class="come">LOGIN</div>

            <div class="email">
                <label for="Mail"></label>
                <br>
                <input type="text" class="email_wala_border" placeholder="  Email" required>
            </div>
            
            <div class="pass">
                <label for="Mail"></label>
                <br>
                <input type="password" class="pass_wala_border" placeholder="  Password" id="myInput" required>
                <br>
                <div class="show"><input type="checkbox" onclick="myFunction()">Show Password </div>
                <br>
                <div class="not_member"><p>Not a member?<a class="cc" href="signup.html"><b>Signup</b></a></p></div>

                <script>
                    function myFunction() {
                      var x = document.getElementById("myInput");
                      if (x.type === "password") {
                        x.type = "text";
                      } else {
                        x.type = "password";
                      }
                    }
                    </script>
            </div>
